name: Test Feature Branches

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # If you are using Maven:
      - name: Run Tests (Maven)
        run: mvn test

      # --- OR --- 
      # If you are NOT using Maven/Gradle and just have raw .java files, 
      # delete the Maven step above and use this instead to check compilation:
      # - name: Compile Java files
      #   run: javac *.java
