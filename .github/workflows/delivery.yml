name: Delivery (Main Branch)

on:
  push:
    branches:
      - main

jobs:
  build-and-deliver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # Baut das Projekt, überspringt die Tests und ignoriert den Checkstyle-Fehler
      - name: Build JAR (Maven)
        run: mvn clean package -DskipTests -Dcheckstyle.skip

      # Lädt die fertige JAR-Datei hoch
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tictactoe-app
          path: target/*.jar
          retention-days: 14
